<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بانل الإدارة</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');
  :root{--bg:#0a0e1a;--surface:#111827;--card:#1a2235;--border:#1e3a5f;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--blue:#3b82f6;--text:#e2e8f0;--muted:#64748b;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

  #login-screen{width:100%;min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 0%,#0d2040 0%,var(--bg) 70%);}
  .login-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:52px 40px;width:360px;box-shadow:0 0 80px rgba(34,197,94,0.07);}
  .login-logo{text-align:center;margin-bottom:36px;}
  .login-logo .icon{font-size:64px;display:block;margin-bottom:12px;}
  .login-logo h1{font-size:24px;font-weight:900;color:var(--green);}
  .login-logo p{font-size:13px;color:var(--muted);margin-top:5px;}
  .field-group{margin-bottom:18px;}
  .field-group label{display:block;font-size:13px;color:var(--muted);margin-bottom:7px;font-weight:600;}
  .field-group input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:16px;outline:none;transition:border-color .2s;text-align:center;letter-spacing:4px;}
  .field-group input:focus{border-color:var(--green);}
  .btn-login{width:100%;background:linear-gradient(135deg,#16a34a,#22c55e);color:#fff;border:none;border-radius:12px;padding:16px;font-family:'Tajawal',sans-serif;font-size:17px;font-weight:900;cursor:pointer;transition:all .2s;margin-top:4px;box-shadow:0 4px 24px rgba(34,197,94,0.3);}
  .btn-login:hover{transform:translateY(-2px);}
  .login-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:11px 14px;font-size:13px;color:var(--red);margin-top:14px;display:none;text-align:center;}

  #panel-screen{display:none;width:100%;min-height:100vh;}
  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
  .topbar-brand{font-size:18px;font-weight:900;color:var(--green);}
  .btn-logout{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:6px 16px;font-family:'Tajawal',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;}
  .btn-logout:hover{border-color:var(--red);color:var(--red);}

  .panel-content{max-width:560px;margin:40px auto;padding:0 20px 80px;}
  .welcome{text-align:center;margin-bottom:32px;}
  .welcome h2{font-size:22px;font-weight:900;}
  .welcome p{font-size:14px;color:var(--muted);margin-top:6px;}

  .actions{display:flex;flex-direction:column;gap:14px;}
  .big-btn{border:none;border-radius:18px;padding:28px 20px;font-family:'Tajawal',sans-serif;font-size:18px;font-weight:900;cursor:pointer;transition:all .25s;display:flex;align-items:center;justify-content:center;gap:14px;width:100%;text-decoration:none;}
  .big-btn:hover{transform:translateY(-3px);}
  .big-btn:active{transform:translateY(0);}
  .btn-open{background:linear-gradient(135deg,#1d4ed8,#3b82f6);color:#fff;box-shadow:0 6px 28px rgba(59,130,246,0.3);}
  .btn-start{background:linear-gradient(135deg,#15803d,#22c55e);color:#fff;box-shadow:0 6px 28px rgba(34,197,94,0.3);}
  .btn-stop{background:linear-gradient(135deg,#7f1d1d,#ef4444);color:#fff;box-shadow:0 6px 28px rgba(239,68,68,0.3);}
  .btn-restart{background:linear-gradient(135deg,#b45309,#f59e0b);color:#fff;box-shadow:0 6px 28px rgba(245,158,11,0.3);}
  .btn-icon{font-size:28px;}

  .note{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;margin-top:20px;}
  .note p{font-size:13px;color:var(--muted);line-height:1.8;}
  .note strong{color:var(--green);}

  @media(max-width:480px){
    .login-box{width:92%;padding:36px 22px;}
    .panel-content{padding:0 14px 60px;}
    .topbar{padding:0 16px;}
  }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <span class="icon">⛏️</span>
      <h1>بانل الإدارة</h1>
      <p>سيرفر ماين كرافت</p>
    </div>
    <div class="field-group">
      <label>🔑 كلمة المرور</label>
      <input type="password" id="panel-pw" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()" autofocus>
    </div>
    <button class="btn-login" onclick="doLogin()">دخول ➜</button>
    <div class="login-error" id="login-error">❌ كلمة المرور غلط</div>
  </div>
</div>

<div id="panel-screen">
  <div class="topbar">
    <div class="topbar-brand">⛏️ بانل الإدارة</div>
    <button class="btn-logout" onclick="doLogout()">خروج</button>
  </div>
  <div class="panel-content">
    <div class="welcome">
      <h2>أهلاً 👋</h2>
      <p>اختر الأمر اللي بدك تنفذه</p>
    </div>

    <div class="actions">
      <a class="big-btn btn-open" href="https://panel.freemcserver.net/server/2070738" target="_blank">
        <span class="btn-icon">🖥️</span> افتح البانل الكامل
      </a>
      <button class="big-btn btn-start" onclick="go('start')">
        <span class="btn-icon">▶️</span> تشغيل السيرفر
      </button>
      <button class="big-btn btn-stop" onclick="go('stop')">
        <span class="btn-icon">⏹️</span> إيقاف السيرفر
      </button>
      <button class="big-btn btn-restart" onclick="go('restart')">
        <span class="btn-icon">🔄</span> إعادة التشغيل
      </button>
    </div>

    <div class="note">
      <p>📌 لما تضغط أي زر رح يفتحلك البانل مباشرة<br>
      سجّل دخول بـ <strong>hsabfryy8@gmail.com</strong><br>
      بعدين نفّذ الأمر اللي بدك ✅</p>
    </div>
  </div>
</div>

<script>
  const PANEL_PW = "963##";
  const BASE = "https://panel.freemcserver.net/server/2070738";

  function doLogin() {
    const pw = document.getElementById('panel-pw').value;
    const err = document.getElementById('login-error');
    if (pw === PANEL_PW) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('panel-screen').style.display = 'block';
    } else {
      err.style.display = 'block';
      document.getElementById('panel-pw').value = '';
      setTimeout(() => err.style.display = 'none', 3000);
    }
  }

  function doLogout() {
    document.getElementById('panel-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('panel-pw').value = '';
  }

  function go(action) {
    window.open(BASE, '_blank');
  }
</script>
</body>
</html>
