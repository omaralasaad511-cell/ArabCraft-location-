<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تحكم السيرفر</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');
  :root{--bg:#0a0e1a;--surface:#111827;--card:#1a2235;--border:#1e3a5f;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--blue:#3b82f6;--text:#e2e8f0;--muted:#64748b;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

  #login-screen{width:100%;min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 0%,#0d2040 0%,var(--bg) 70%);}
  .login-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:52px 40px;width:380px;box-shadow:0 0 80px rgba(34,197,94,0.07);}
  .login-logo{text-align:center;margin-bottom:36px;}
  .login-logo .icon{font-size:64px;display:block;margin-bottom:12px;}
  .login-logo h1{font-size:24px;font-weight:900;color:var(--green);}
  .login-logo p{font-size:13px;color:var(--muted);margin-top:5px;}
  .field-group{margin-bottom:18px;}
  .field-group label{display:block;font-size:13px;color:var(--muted);margin-bottom:7px;font-weight:600;}
  .field-group input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:15px;outline:none;transition:border-color .2s;text-align:center;letter-spacing:3px;}
  .field-group input:focus{border-color:var(--green);}
  .btn-login{width:100%;background:linear-gradient(135deg,#16a34a,#22c55e);color:#fff;border:none;border-radius:12px;padding:16px;font-family:'Tajawal',sans-serif;font-size:17px;font-weight:900;cursor:pointer;transition:all .2s;margin-top:4px;box-shadow:0 4px 24px rgba(34,197,94,0.3);}
  .btn-login:hover{transform:translateY(-2px);}
  .login-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:11px 14px;font-size:13px;color:var(--red);margin-top:14px;display:none;text-align:center;}

  #panel-screen{display:none;width:100%;min-height:100vh;}
  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
  .topbar-brand{font-size:18px;font-weight:900;color:var(--green);}
  .btn-logout{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:6px 16px;font-family:'Tajawal',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;}
  .btn-logout:hover{border-color:var(--red);color:var(--red);}

  .panel-content{max-width:600px;margin:40px auto;padding:0 20px 80px;}
  .welcome{text-align:center;margin-bottom:36px;}
  .welcome h2{font-size:22px;font-weight:900;}
  .welcome p{font-size:14px;color:var(--muted);margin-top:6px;}

  .main-actions{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
  .big-btn{border:none;border-radius:18px;padding:32px 16px;font-family:'Tajawal',sans-serif;font-size:17px;font-weight:900;cursor:pointer;transition:all .25s;display:flex;flex-direction:column;align-items:center;gap:10px;width:100%;}
  .big-btn .btn-icon{font-size:40px;}
  .big-btn:hover{transform:translateY(-4px);}
  .btn-start{background:linear-gradient(135deg,#15803d,#22c55e);color:#fff;box-shadow:0 6px 28px rgba(34,197,94,0.3);}
  .btn-restart{background:linear-gradient(135deg,#b45309,#f59e0b);color:#fff;box-shadow:0 6px 28px rgba(245,158,11,0.3);}

  .status-bar{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 22px;margin-bottom:20px;display:flex;align-items:center;gap:14px;}
  .status-dot{width:12px;height:12px;border-radius:50%;background:var(--muted);flex-shrink:0;}
  .status-dot.working{background:var(--green);box-shadow:0 0 10px var(--green);animation:pulse 2s infinite;}
  .status-dot.error{background:var(--red);}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .status-text{font-size:14px;font-weight:600;}

  .log-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 22px;}
  .log-card h3{font-size:13px;color:var(--muted);font-weight:700;margin-bottom:12px;}
  .log-list{list-style:none;display:flex;flex-direction:column;gap:7px;max-height:180px;overflow-y:auto;}
  .log-item{display:flex;gap:10px;font-size:13px;padding:7px 10px;background:var(--surface);border-radius:7px;}
  .log-time{color:var(--muted);font-size:11px;white-space:nowrap;direction:ltr;padding-top:1px;}
  .log-msg{color:var(--text);}
  .log-success .log-msg{color:var(--green);}
  .log-error .log-msg{color:var(--red);}
  .log-warn .log-msg{color:var(--yellow);}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 24px;font-size:14px;font-weight:700;transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:99;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.4);}
  .toast.show{transform:translateX(-50%) translateY(0);}
  .toast.success{color:var(--green);border-color:rgba(34,197,94,.3);}
  .toast.error{color:var(--red);border-color:rgba(239,68,68,.3);}

  .spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg)}}

  @media(max-width:480px){
    .login-box{width:92%;padding:36px 22px;}
    .main-actions{grid-template-columns:1fr;}
    .panel-content{padding:0 14px 60px;}
    .topbar{padding:0 16px;}
  }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <span class="icon">⛏️</span>
      <h1>بانل الإدارة</h1>
      <p>سيرفر ماين كرافت</p>
    </div>
    <div class="field-group">
      <label>🔑 كلمة المرور</label>
      <input type="password" id="panel-pw" placeholder="••••••••••" onkeydown="if(event.key==='Enter')doLogin()" autofocus>
    </div>
    <button class="btn-login" onclick="doLogin()">دخول ➜</button>
    <div class="login-error" id="login-error">❌ كلمة المرور غلط</div>
  </div>
</div>

<div id="panel-screen">
  <div class="topbar">
    <div class="topbar-brand">⛏️ بانل الإدارة</div>
    <button class="btn-logout" onclick="doLogout()">خروج</button>
  </div>
  <div class="panel-content">
    <div class="welcome">
      <h2>أهلاً 👋</h2>
      <p>اضغط تشغيل أو إعادة تشغيل</p>
    </div>

    <div class="status-bar" id="status-bar">
      <div class="status-dot" id="status-dot"></div>
      <span class="status-text" id="status-text">جاهز للأوامر</span>
    </div>

    <div class="main-actions">
      <button class="big-btn btn-start" id="btn-start" onclick="sendCmd('start')">
        <span class="btn-icon">▶️</span>
        تشغيل
      </button>
      <button class="big-btn btn-restart" id="btn-restart" onclick="sendCmd('restart')">
        <span class="btn-icon">🔄</span>
        إعادة تشغيل
      </button>
    </div>

    <div class="log-card">
      <h3>📋 سجل الأوامر</h3>
      <ul class="log-list" id="log-list">
        <li class="log-item"><span class="log-time">--:--</span><span class="log-msg">في انتظار الأوامر...</span></li>
      </ul>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PANEL_PW = "963##";
const EMAIL    = "hsabfryy8@gmail.com";
const PASSWORD = "Omar963#";
const PROXY    = "https://corsproxy.io/?url=";
const API      = "https://freemcserver.p.rapidapi.com";
const RAPID_KEY= "07da055f69msh73cd7f99478a75bp193fc4jsn08cce81536bc";

let token = null;

function doLogin() {
  const pw = document.getElementById('panel-pw').value;
  if (pw === PANEL_PW) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('panel-screen').style.display = 'block';
    addLog('تم الدخول ✅', 'success');
    getToken();
  } else {
    const e = document.getElementById('login-error');
    e.style.display = 'block';
    document.getElementById('panel-pw').value = '';
    setTimeout(() => e.style.display = 'none', 3000);
  }
}

function doLogout() {
  token = null;
  document.getElementById('panel-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('panel-pw').value = '';
}

async function getToken() {
  setStatus('load', 'جاري الاتصال...');
  addLog('جاري تسجيل الدخول التلقائي...', 'warn');
  try {
    const res = await fetch(PROXY + encodeURIComponent('https://freemcserver.p.rapidapi.com/user/login'), {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-rapidapi-host': 'freemcserver.p.rapidapi.com',
        'x-rapidapi-key': RAPID_KEY
      },
      body: JSON.stringify({ email: EMAIL, password: PASSWORD })
    });
    const data = await res.json();
    token = data.token || data.access_token || data.data?.token || null;
    if (token) {
      setStatus('ok', 'متصل ✅');
      addLog('تم الاتصال بالسيرفر ✅', 'success');
    } else {
      throw new Error(data.message || 'فشل الاتصال');
    }
  } catch(e) {
    setStatus('err', 'خطأ في الاتصال');
    addLog('خطأ: ' + e.message, 'error');
  }
}

async function sendCmd(action) {
  if (!token) { await getToken(); if (!token) return; }
  const btn = document.getElementById('btn-' + action);
  const orig = btn.innerHTML;
  btn.disabled = true;
  document.getElementById('btn-start').disabled = true;
  document.getElementById('btn-restart').disabled = true;
  btn.innerHTML = `<span class="spin"></span><br>${action === 'start' ? 'جاري التشغيل...' : 'جاري إعادة التشغيل...'}`;
  addLog(`إرسال أمر ${action === 'start' ? 'التشغيل' : 'إعادة التشغيل'}...`, 'warn');

  try {
    const res = await fetch(PROXY + encodeURIComponent(`${API}/server/${action}`), {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-fmcs-token': token,
        'x-rapidapi-host': 'freemcserver.p.rapidapi.com',
        'x-rapidapi-key': RAPID_KEY
      }
    });
    if (res.ok || res.status === 204) {
      showToast(action === 'start' ? '✅ تم تشغيل السيرفر' : '✅ تمت إعادة التشغيل', 'success');
      addLog(action === 'start' ? '✅ السيرفر اشتغل!' : '✅ تمت إعادة التشغيل!', 'success');
      setStatus('ok', action === 'start' ? 'السيرفر شغال ✅' : 'تمت إعادة التشغيل ✅');
    } else {
      const d = await res.json().catch(() => ({}));
      throw new Error(d.message || `HTTP ${res.status}`);
    }
  } catch(e) {
    showToast('❌ فشل: ' + e.message, 'error');
    addLog('❌ فشل: ' + e.message, 'error');
  }

  btn.innerHTML = orig;
  document.getElementById('btn-start').disabled = false;
  document.getElementById('btn-restart').disabled = false;
}

function setStatus(state, text) {
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot' + (state === 'ok' ? ' working' : state === 'err' ? ' error' : '');
  document.getElementById('status-text').textContent = text;
}

function addLog(msg, type='') {
  const list = document.getElementById('log-list');
  const now = new Date().toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const li = document.createElement('li');
  li.className = 'log-item' + (type ? ' log-'+type : '');
  li.innerHTML = `<span class="log-time">${now}</span><span class="log-msg">${msg}</span>`;
  if (list.children.length===1 && list.children[0].querySelector('.log-msg')?.textContent.includes('انتظار')) list.innerHTML='';
  list.insertBefore(li, list.firstChild);
  if (list.children.length > 20) list.removeChild(list.lastChild);
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type;
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => t.classList.remove('show'), 3500);
}
</script>
</body>
</html>
